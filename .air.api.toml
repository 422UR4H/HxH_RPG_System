root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/air-api ./cmd/api/main.go"
  bin = "./tmp/air-api"
  include_ext = ["go"]
  exclude_dir = ["tmp", "bin", "docs", "migrations", ".worktrees", "testdata"]
  exclude_regex = ["_test\\.go$"]
  delay = 500
  stop_on_error = true
  kill_delay = "200ms"
  send_interrupt = true
  log = "tmp/air-api-build.log"

[log]
  time = true

[screen]
  clear_on_rebuild = true
