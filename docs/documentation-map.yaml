# Documentation Map — Single Source of Truth
#
# Maps code paths to their corresponding documentation files.
# Used by AGENTS.md rules and the documentation-check extension tool.
#
# Format:
#   Each entry maps a code path prefix to the docs that describe its behavior.
#   - code_path: Prefix match against changed files (directory or file)
#   - dev_docs: Developer-facing technical documentation (docs/dev/)
#   - game_docs: Player-facing game rules documentation (docs/game/)
#   - notes: Optional context about what kind of changes trigger doc updates
#
# Confidence levels when reporting:
#   - directly_affected: Code path is the primary subject of the doc
#   - possibly_affected: Code path contributes to the doc's topic but isn't central
#
# Rules:
#   - If a changed file matches NO entry → "unmapped: manual review required"
#   - If a changed file matches an entry → report affected docs
#   - Changes to docs/ files themselves don't trigger this check

mappings:
